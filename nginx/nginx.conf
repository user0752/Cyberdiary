# ---- P2-2: gzip, static caching, rate limiting, security headers ----

# Rate limit zone for the login/auth endpoints — 10 req/s per IP bucket.
# Allocated at startup; ~10MB holds ~16k distinct IP buckets.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

# Zone for general API requests — 30 req/s per IP. Generous enough for the
# SSE chat stream (one long-lived connection) while still blunting brute force.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # --- Security headers (P2-2) ---
    # HTTPS is terminated upstream in production; for the bare-metal compose
    # setup we still send HSTS only if you've put a TLS terminator in front.
    # Toggle via the X-Forwarded-Proto header from your reverse proxy.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # CSP allows inline styles (Vue runtime) and the same origin for scripts/XHR.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self';" always;

    # --- gzip (P2-2) ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/font-woff2
        image/svg+xml;

    client_max_body_size 10m;

    # --- Auth endpoints: stricter rate limit (P2-2) ---
    location ~ ^/api/v1/auth/(login|register)$ {
        limit_req zone=auth_limit burst=20 nodelay;
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API reverse proxy (SSE-aware) ---
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support: disable buffering, extend timeout for long streams.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # --- Static assets: long cache + immutable (P2-2) ---
    # Vite emits content-hashed filenames, so anything under /assets/ is
    # safe to cache aggressively for a year.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must NOT be cached so users get new deploys immediately.
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # --- Frontend static files (SPA fallback) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version from error pages / Server header.
    server_tokens off;
}
