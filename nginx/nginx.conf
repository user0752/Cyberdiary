server {
    listen 80;

    # API reverse proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Frontend static files (built into the nginx image)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback: unknown routes serve index.html so Vue Router handles them
        try_files $uri $uri/ /index.html;
    }
}
