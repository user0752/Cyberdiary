version: '3.9'

services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/cybernote.db
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - AUTH_MODE=none
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend
